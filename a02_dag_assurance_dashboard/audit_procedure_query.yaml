sql_audit_procedure_append: >
  INSERT INTO IA.PUBLIC_REPORTS.PBIREP_ASSURANCE_AUDIT_PROCEDURE_SLICER(SORT_ORDER, AUDIT_PROCEDURE)
  WITH 
  master(SORT_ORDER_A, AUDIT_MANUAL, SORT_ORDER_B, AUDIT_CHAPTER, SORT_ORDER, GUIDELINE) AS 
  (SELECT DISTINCT SORT_ORDER_A, AUDIT_MANUAL,SORT_ORDER_B, AUDIT_CHAPTER, SORT_ORDER, GUIDELINE 
  FROM IA.AUDIMEX_SOURCE.TBL_AUDMX_AUDIT_MANUAL_TREE
  ORDER BY SORT_ORDER_A, SORT_ORDER_B, SORT_ORDER)
  ,
  dupch(AUDIT_CHAPTER, GUIDELINE , COUNT) AS 
  (SELECT AUDIT_CHAPTER, GUIDELINE , COUNT(*)
  FROM MASTER
  GROUP BY  AUDIT_CHAPTER, GUIDELINE
  HAVING COUNT(*)>1)
  , 
  dupam(AUDIT_MANUAL, AUDIT_CHAPTER, GUIDELINE , COUNTROW) AS 
  (SELECT AUDIT_MANUAL, AUDIT_CHAPTER, GUIDELINE , ROW_NUMBER()  OVER (PARTITION BY AUDIT_MANUAL, guideline 
  ORDER BY audit_chapter, GUIDELINE)
  FROM MASTER) 
  ,
  dupagg(GUIDELINE) AS 
  (SELECT guideline FROM dupch 
  UNION ALL 
  SELECT GUIDELINE FROM dupam 
  WHERE countrow>1)
  ,
  dup(guideline) AS 
  (SELECT guideline FROM (
  SELECT guideline, count(*) FROM master
  GROUP BY guideline 
  HAVING count(*)>1))
  ,
  nodup(SORT_ORDER, GUIDELINE) AS
  (SELECT SORT_ORDER, GUIDELINE FROM IA.AUDIMEX_SOURCE.TBL_AUDMX_AUDIT_MANUAL_TREE
  WHERE GUIDELINE NOT IN (SELECT guideline FROM dup GROUP BY guideline) 
  GROUP BY sort_order, guideline)
  ,
  duptrans(SORT_ORDER,GUIDELINE) AS 
  (SELECT SORT_ORDER, GUIDELINE||'-'||AUDIT_CHAPTER||'-'||AUDIT_MANUAL FROM MASTER
  WHERE GUIDELINE IN (SELECT guideline FROM dup) 
  )
  ,
  conso(SORT_ORDER, GUIDELINE) AS 
  (SELECT SORT_ORDER, GUIDELINE FROM nodup 
  UNION ALL 
  SELECT SORT_ORDER, GUIDELINE 
  FROM duptrans)
  SELECT 
  SORT_ORDER, 
  GUIDELINE 
  FROM conso
  GROUP BY SORT_ORDER, GUIDELINE 
  ORDER BY SORT_ORDER