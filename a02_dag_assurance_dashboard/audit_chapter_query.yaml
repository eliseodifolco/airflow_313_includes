sql_audit_chapter_append: >
  INSERT INTO IA.PUBLIC_REPORTS.PBIREP_ASSURANCE_AUDIT_CHAPTER_SLICER(SORT_ORDER_B, AUDIT_CHAPTER)
  WITH
  master(SORT_ORDER_A, AUDIT_MANUAL, SORT_ORDER_B, AUDIT_CHAPTER) AS 
  (SELECT DISTINCT SORT_ORDER_A, AUDIT_MANUAL, SORT_ORDER_B, AUDIT_CHAPTER 
  FROM IA.AUDIMEX_SOURCE.TBL_AUDMX_AUDIT_MANUAL_TREE)
  ,
  dup(AUDIT_CHAPTER, DUPLICATES) AS 
  (SELECT AUDIT_CHAPTER , COUNT(*) 
  FROM (SELECT DISTINCT AUDIT_MANUAL, AUDIT_CHAPTER FROM IA.AUDIMEX_SOURCE.TBL_AUDMX_AUDIT_MANUAL_TREE)
  GROUP BY AUDIT_CHAPTER
  HAVING COUNT(*)>1)
  ,
  nodup(SORT_ORDER_B, AUDIT_CHAPTER) AS 
  (SELECT SORT_ORDER_B, AUDIT_CHAPTER
  FROM IA.AUDIMEX_SOURCE.TBL_AUDMX_AUDIT_MANUAL_TREE
  WHERE AUDIT_CHAPTER NOT IN (SELECT AUDIT_CHAPTER FROM dup)
  GROUP BY SORT_ORDER_B, AUDIT_CHAPTER
  ORDER BY sort_order_B)
  ,
  duptrans(SORT_ORDER_B, AUDIT_CHAPTER) AS 
  (SELECT SORT_ORDER_B, AUDIT_CHAPTER||'-'||AUDIT_MANUAL
  FROM master
  WHERE AUDIT_CHAPTER IN (SELECT AUDIT_CHAPTER FROM dup)
  ORDER BY sort_order_B)
  ,
  conso(SORT_ORDER_B, audit_chapter) AS 
  (SELECT SORT_ORDER_B, audit_chapter 
  FROM nodup
  UNION ALL
  SELECT SORT_ORDER_B, audit_chapter
  FROM duptrans)
  SELECT SORT_ORDER_B, AUDIT_CHAPTER
  FROM conso
  GROUP BY SORT_ORDER_B, AUDIT_CHAPTER
  ORDER BY SORT_ORDER_B